# =====================================================================
# HOW TO RUN THIS
# =====================================================================
# None of the values below have real defaults anymore — every secret
# must come from an environment variable, or Spring Boot will fail to
# start (which is the point: it stops you from accidentally shipping
# a working config with someone's real DB password baked in).
#
# 1. Copy this file to application-local.properties (already gitignored)
#    OR just export the env vars below in your shell / .env before
#    running the app. Either works, application-local.properties just
#    saves you from re-exporting every terminal session.
#
# 2. Required env vars (get real values from whoever owns the Supabase
#    project / Cloudinary account, or create your own for local dev):
#
#      JDBC_DATABASE_URL       e.g. jdbc:postgresql://<host>:5432/postgres?prepareThreshold=0
#      JDBC_DATABASE_USERNAME  your Supabase/Postgres user
#      JDBC_DATABASE_PASSWORD  your Supabase/Postgres password
#      JWT_SECRET              random 256-bit base64 string, generate with:
#                                 openssl rand -base64 32
#      CLOUDINARY_CLOUD_NAME   from Cloudinary dashboard
#      CLOUDINARY_API_KEY      from Cloudinary dashboard
#      CLOUDINARY_API_SECRET   from Cloudinary dashboard
#
#    Optional (have safe defaults, override only if you want to):
#      USERNAME_CHANGE_COOLDOWN  seconds, default 1209600 (14 days)
#      COOKIE_SECURE             default true, set to false ONLY for
#                                 local http (non-https) testing
#
# 3. Run it:
#      export JDBC_DATABASE_URL=jdbc:postgresql://localhost:5432/blog
#      export JDBC_DATABASE_USERNAME=postgres
#      export JDBC_DATABASE_PASSWORD=postgres
#      export JWT_SECRET=$(openssl rand -base64 32)
#      export CLOUDINARY_CLOUD_NAME=your-cloud-name
#      export CLOUDINARY_API_KEY=your-api-key
#      export CLOUDINARY_API_SECRET=your-api-secret
#      ./mvnw spring-boot:run
#
#    Or with Docker, pass them as -e flags / an env file to `docker run`.
#
# NEVER commit real values for the vars above. If you ever do, rotate
# them immediately (regenerate the secret/password) — deleting the
# text in a new commit does NOT remove it from git history.
# =====================================================================

spring.application.name=backend

# Logging
logging.level.root=INFO
logging.level.com.zero1blog.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.properties.hibernate.format_sql=true

# Database
# No fallback value on purpose — app must fail fast if these aren't set,
# rather than silently connecting to nothing (or to someone else's DB).
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}

# HikariCP connection pool (right-sized for Supabase pooler)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=Zero1BlogHikariPool

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# App
server.port=8080

# JSON
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT
# Generate a fresh secret with: openssl rand -base64 32
# Do not reuse the one that was previously hardcoded here — treat it as
# burned even if you rotate this file, since it may still be in old commits.
jwt.secret=${JWT_SECRET}
jwt.expiration=1500000

# Username change cooldown policy (in seconds). Default: 14 days.
app.username-change-cooldown=${USERNAME_CHANGE_COOLDOWN:1209600}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Cookie security
# Set to false only for local http (non-https) testing, keep true everywhere else
cookie.secure=${COOKIE_SECURE:true}

# Upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB