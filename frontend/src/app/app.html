<mat-toolbar color="primary" *ngIf="authService.isLoggedIn()" class="global-header">
  <div class="header-content">
    <span class="brand" (click)="goToFeed()">Z1Spot</span>
    
    <span class="spacer"></span>
    
    <div class="nav-actions">
      <button mat-icon-button (click)="goToNotifications()" matTooltip="Notifications">
        <mat-icon [matBadge]="unreadCount" matBadgeColor="warn" [matBadgeHidden]="unreadCount === 0">notifications</mat-icon>
      </button>

      <button mat-icon-button (click)="goToCreate()" matTooltip="Write a Post">
        <mat-icon>add_box</mat-icon>
      </button>
      
      <button mat-button class="profile-btn" [matMenuTriggerFor]="userMenu">
        <span class="nav-username">{{ authService.getUsername() }}</span>
        <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu" xPosition="before" class="user-dropdown-menu">
        <button mat-menu-item (click)="goToMyProfile()">
          <mat-icon>person</mat-icon>
          <span>My Profile</span>
        </button>

        <button mat-menu-item *ngIf="authService.getRole() === 'ADMIN'" (click)="goToAdmin()">
          <mat-icon>admin_panel_settings</mat-icon>
          <span>Admin Panel</span>
        </button>

        <button mat-menu-item (click)="themeService.toggleDarkMode()">
          <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
          <span>{{ themeService.isDarkMode() ? 'Light Mode' : 'Dark Mode' }}</span>
        </button>

        <mat-divider></mat-divider>

        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </div>
  </div>
</mat-toolbar>

<main [class.main-bg]="authService.isLoggedIn()" [class.dark-mode]="themeService.isDarkMode()">
  <router-outlet></router-outlet>
</main>
