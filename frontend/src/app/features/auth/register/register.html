<div class="auth-wrapper">
  <div class="auth-brand">
    <h1>Z1Spot</h1>
    <p>Share your voice.</p>
  </div>
  
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Create an account</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">

        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" placeholder="e.g. janesmith" />
          <mat-icon matPrefix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="e.g. jane@example.com" />
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" />
          <mat-icon matPrefix>lock</mat-icon>
        </mat-form-field>

        <div class="error-container" *ngIf="error">
          <mat-icon color="warn">error</mat-icon>
          <span>{{ error }}</span>
        </div>

        <button mat-flat-button color="primary" type="submit"
          [disabled]="form.invalid || loading" class="submit-btn">
          {{ loading ? 'Creating account...' : 'Create Account' }}
        </button>

      </form>
    </mat-card-content>
    
    <mat-card-footer class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Log in</a></p>
    </mat-card-footer>
  </mat-card>
</div>
