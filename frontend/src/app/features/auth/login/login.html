<div class="auth-wrapper">
  <div class="auth-brand">
    <h1>Z1Spot</h1>
    <p>Join the conversation.</p>
  </div>
  
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Welcome back</mat-card-title>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">

        <mat-form-field appearance="outline">
          <mat-label>Email or Username</mat-label>
          <input matInput type="text" formControlName="usernameOrEmail" placeholder="e.g. janesmith" />
          <mat-icon matPrefix>person</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" />
          <mat-icon matPrefix>lock</mat-icon>
        </mat-form-field>

        <div class="error-container" *ngIf="error">
          <mat-icon color="warn">error</mat-icon>
          <span>{{ error }}</span>
        </div>

        <button mat-flat-button color="primary" type="submit"
          [disabled]="form.invalid || loading" class="submit-btn">
          {{ loading ? 'Logging in...' : 'Login' }}
        </button>

      </form>
    </mat-card-content>
    
    <mat-card-footer class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Register now</a></p>
    </mat-card-footer>
  </mat-card>
</div>
