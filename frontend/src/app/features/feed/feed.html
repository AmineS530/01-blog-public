<div class="feed-container">
  
  <div class="feed-header">
    <h2>Your Feed</h2>
  </div>

  <div *ngIf="loading" class="centered">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <div *ngIf="error" class="centered error">{{ error }}</div>

  <div *ngIf="!loading && !error && posts.length === 0" class="centered muted">
    <div class="empty-state">
      <mat-icon>article</mat-icon>
      <p>No posts yet. Be the first to write something!</p>
    </div>
  </div>

  <mat-card *ngFor="let post of posts" class="post-card" (click)="goToPost(post.id)">
    <div class="post-header">
      <div class="author-avatar" (click)="goToProfile($event, post.authorUsername)">
        <img *ngIf="post.authorAvatarUrl" [src]="'http://localhost:8080' + post.authorAvatarUrl" alt="Avatar" />
        <span *ngIf="!post.authorAvatarUrl">{{ post.authorUsername.charAt(0).toUpperCase() }}</span>
      </div>
      <div class="header-text">
        <a class="author-name" href="javascript:void(0)" (click)="goToProfile($event, post.authorUsername)">
          {{ post.authorUsername }}
        </a>
        <span class="post-date">· {{ post.createdAt | date:'MMM d, y, h:mm a' }}</span>
      </div>
    </div>
    
    <mat-card-content>
      <div class="post-media" *ngIf="post.mediaUrl">
        <img *ngIf="post.mediaUrl.toLowerCase().match('\\.(jpg|jpeg|png|gif|webp)$')" [src]="'http://localhost:8080' + post.mediaUrl" alt="Media" />
        <video *ngIf="post.mediaUrl.toLowerCase().match('\\.(mp4|webm|ogg)$')" [src]="'http://localhost:8080' + post.mediaUrl" controls></video>
      </div>
      <h3 class="post-title">{{ post.title }}</h3>
      <p class="preview" [innerHTML]="(post.content | slice:0:300) + (post.content.length > 300 ? '...' : '') | markdown"></p>
    </mat-card-content>
    
    <mat-card-actions class="post-actions">
      <div class="actions-left">
        <button mat-icon-button (click)="toggleLike($event, post)" [color]="post.isLikedByCurrentUser ? 'warn' : ''" matTooltip="Like">
          <mat-icon>{{ post.isLikedByCurrentUser ? 'favorite' : 'favorite_border' }}</mat-icon>
        </button>
        <span class="action-count" [class.liked]="post.isLikedByCurrentUser">{{ post.likeCount }}</span>
        
        <button mat-icon-button disabled matTooltip="Comments">
          <mat-icon>chat_bubble_outline</mat-icon>
        </button>
        <span class="action-count">{{ post.commentCount }}</span>
      </div>
      <span class="spacer"></span>
      <button mat-icon-button (click)="reportPost($event, post)" matTooltip="Report Post">
        <mat-icon>flag</mat-icon>
      </button>
    </mat-card-actions>
  </mat-card>

</div>
