<mat-toolbar color="primary">
  <span>zero1blog</span>
  <span class="spacer"></span>
  <span class="username">{{ currentUsername }}</span>
  <button mat-icon-button (click)="goToCreate()" matTooltip="New post">
    <mat-icon>edit</mat-icon>
  </button>
  <button mat-icon-button (click)="logout()" matTooltip="Logout">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>

<div class="feed-container">

  <div *ngIf="loading" class="centered">
    <mat-spinner diameter="48" />
  </div>

  <div *ngIf="error" class="centered error">{{ error }}</div>

  <div *ngIf="!loading && !error && posts.length === 0" class="centered muted">
    No posts yet. Be the first to write something.
  </div>

  <mat-card
    *ngFor="let post of posts"
    class="post-card"
    (click)="goToPost(post.id)"
  >
    <mat-card-header>
      <mat-card-title>{{ post.title }}</mat-card-title>
      <mat-card-subtitle>
        by {{ post.authorUsername }} · {{ post.createdAt | date:'mediumDate' }}
      </mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p class="preview">{{ post.content | slice:0:200 }}{{ post.content.length > 200 ? '...' : '' }}</p>
    </mat-card-content>
  </mat-card>

</div>
