<mat-toolbar color="primary">
  <button mat-icon-button (click)="cancel()" matTooltip="Cancel">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <span>Edit post</span>
</mat-toolbar>

<div class="form-container">

  <div *ngIf="loading" class="centered">
    <mat-spinner diameter="48" />
  </div>

  <mat-card *ngIf="!loading" class="form-card">
    <mat-card-content>

      <div *ngIf="error" class="error">{{ error }}</div>

      <form [formGroup]="postForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Title</mat-label>
          <input matInput formControlName="title" />
          <mat-error *ngIf="postForm.get('title')?.hasError('required')">
            Title is required
          </mat-error>
          <mat-error *ngIf="postForm.get('title')?.hasError('maxlength')">
            Max 100 characters
          </mat-error>
        </mat-form-field>

        <div class="editor-tabs">
          <button type="button" class="tab-btn" [class.active]="editorTab === 'write'" (click)="editorTab = 'write'">
            <mat-icon>edit</mat-icon> Write
          </button>
          <button type="button" class="tab-btn" [class.active]="editorTab === 'preview'" (click)="editorTab = 'preview'">
            <mat-icon>visibility</mat-icon> Preview
          </button>
        </div>

        <div class="editor-container" [hidden]="editorTab !== 'write'">
          <div class="editor-box">
            <div class="formatting-toolbar">
              <button type="button" class="toolbar-btn" (click)="insertMarkdown('bold', contentArea)" matTooltip="Bold text">
                <mat-icon>format_bold</mat-icon>
              </button>
              <button type="button" class="toolbar-btn" (click)="insertMarkdown('italic', contentArea)" matTooltip="Italic text">
                <mat-icon>format_italic</mat-icon>
              </button>
              <button type="button" class="toolbar-btn" (click)="insertMarkdown('link', contentArea)" matTooltip="Add link">
                <mat-icon>insert_link</mat-icon>
              </button>
              <button type="button" class="toolbar-btn" (click)="insertMarkdown('list', contentArea)" matTooltip="Bulleted list">
                <mat-icon>format_list_bulleted</mat-icon>
              </button>
              <button type="button" class="toolbar-btn" (click)="insertMarkdown('numlist', contentArea)" matTooltip="Numbered list">
                <mat-icon>format_list_numbered</mat-icon>
              </button>
              <button type="button" class="toolbar-btn" (click)="insertMarkdown('code', contentArea)" matTooltip="Code block">
                <mat-icon>code</mat-icon>
              </button>
            </div>
            <textarea formControlName="content" rows="14" #contentArea placeholder="Write your post content here... (Supports Markdown)" class="editor-textarea"></textarea>
          </div>
          <div class="editor-error" *ngIf="postForm.get('content')?.touched && postForm.get('content')?.invalid">
            <span *ngIf="postForm.get('content')?.hasError('required')">Content is required.</span>
            <span *ngIf="postForm.get('content')?.hasError('maxlength')">Content cannot exceed 5000 characters.</span>
          </div>
        </div>

        <div class="preview-container animate-fade" *ngIf="editorTab === 'preview'">
          <div class="markdown-preview-pane" [innerHTML]="postForm.get('content')?.value | markdown"></div>
          <div *ngIf="!postForm.get('content')?.value" class="preview-empty">No content to preview yet. Start typing under the Write tab!</div>
        </div>

        <div class="media-upload-section">
          <input type="file" id="mediaUploadEdit" (change)="onFileSelected($event)" accept="image/*,video/*" style="display: none" #fileInput>
          <button mat-stroked-button type="button" (click)="fileInput.click()" [disabled]="uploadingMedia">
            <mat-icon>attach_file</mat-icon>
            {{ uploadingMedia ? 'Uploading...' : 'Attach Image or Video' }}
          </button>
          
          <div class="media-preview" *ngIf="mediaUrl">
            <div class="media-preview-inner">
              <img *ngIf="mediaUrl.toLowerCase().match('\\.(jpg|jpeg|png|gif|webp)$')" [src]=" mediaUrl" alt="Preview" />
              <video *ngIf="mediaUrl.toLowerCase().match('\\.(mp4|webm|ogg)$')" [src]=" mediaUrl" controls></video>
              <button mat-icon-button color="warn" type="button" class="remove-media-btn" (click)="removeMedia()">
                <mat-icon>close</mat-icon>
              </button>
            </div>
          </div>
        </div>

        <div class="actions">
          <button mat-button type="button" (click)="cancel()">Cancel</button>
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="postForm.invalid || submitting || uploadingMedia"
          >
            {{ submitting ? 'Saving...' : 'Save changes' }}
          </button>
        </div>

      </form>

    </mat-card-content>
  </mat-card>

</div>
