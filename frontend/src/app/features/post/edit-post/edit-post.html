<mat-toolbar color="primary">
  <button mat-icon-button (click)="cancel()" matTooltip="Cancel">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <span>Edit post</span>
</mat-toolbar>

<div class="form-container">

  <div *ngIf="loading" class="centered">
    <mat-spinner diameter="48" />
  </div>

  <mat-card *ngIf="!loading" class="form-card">
    <mat-card-content>

      <div *ngIf="error" class="error">{{ error }}</div>

      <form [formGroup]="postForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Title</mat-label>
          <input matInput formControlName="title" />
          <mat-error *ngIf="postForm.get('title')?.hasError('required')">
            Title is required
          </mat-error>
          <mat-error *ngIf="postForm.get('title')?.hasError('maxlength')">
            Max 100 characters
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Content</mat-label>
          <textarea matInput formControlName="content" rows="14"></textarea>
          <mat-error *ngIf="postForm.get('content')?.hasError('required')">
            Content is required
          </mat-error>
          <mat-error *ngIf="postForm.get('content')?.hasError('maxlength')">
            Max 5000 characters
          </mat-error>
        </mat-form-field>

        <div class="media-upload-section">
          <input type="file" id="mediaUploadEdit" (change)="onFileSelected($event)" accept="image/*,video/*" style="display: none" #fileInput>
          <button mat-stroked-button type="button" (click)="fileInput.click()" [disabled]="uploadingMedia">
            <mat-icon>attach_file</mat-icon>
            {{ uploadingMedia ? 'Uploading...' : 'Attach Image or Video' }}
          </button>
          
          <div class="media-preview" *ngIf="mediaUrl">
            <div class="media-preview-inner">
              <img *ngIf="mediaUrl.toLowerCase().match('\\.(jpg|jpeg|png|gif|webp)$')" [src]="'http://localhost:8080' + mediaUrl" alt="Preview" />
              <video *ngIf="mediaUrl.toLowerCase().match('\\.(mp4|webm|ogg)$')" [src]="'http://localhost:8080' + mediaUrl" controls></video>
              <button mat-icon-button color="warn" type="button" class="remove-media-btn" (click)="removeMedia()">
                <mat-icon>close</mat-icon>
              </button>
            </div>
          </div>
        </div>

        <div class="actions">
          <button mat-button type="button" (click)="cancel()">Cancel</button>
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="postForm.invalid || submitting || uploadingMedia"
          >
            {{ submitting ? 'Saving...' : 'Save changes' }}
          </button>
        </div>

      </form>

    </mat-card-content>
  </mat-card>

</div>
