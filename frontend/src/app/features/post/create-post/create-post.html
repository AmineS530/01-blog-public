<div class="create-post-wrapper">
  <div class="header">
    <button mat-icon-button (click)="cancel()" matTooltip="Back">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h2>Create New Post</h2>
  </div>

  <mat-card class="form-card">
    <mat-card-content>
      <div class="creator-header" *ngIf="currentUserDisplayName">
        <div class="creator-avatar">
          <img *ngIf="currentUserAvatarUrl" [src]="currentUserAvatarUrl" alt="Avatar" />
          <span *ngIf="!currentUserAvatarUrl">{{ currentUserDisplayName.charAt(0).toUpperCase() }}</span>
        </div>
        <div class="creator-info">
          <span class="creator-name">{{ currentUserDisplayName }}</span>
          <span class="creator-subtitle">Publishing to Feed</span>
        </div>
      </div>

      <form [formGroup]="postForm" (ngSubmit)="onSubmit()" class="form-layout">
        
        <div class="error-container" *ngIf="error">
          <mat-icon color="warn">error</mat-icon>
          <span>{{ error }}</span>
        </div>

        <mat-form-field appearance="outline" class="full-width title-field">
          <mat-label>Title</mat-label>
          <input matInput formControlName="title" placeholder="Give your post a catchy title" />
          <mat-error *ngIf="postForm.get('title')?.hasError('required')">Title is required.</mat-error>
        </mat-form-field>

        <div class="editor-tabs">
          <button type="button" class="tab-btn" [class.active]="editorTab === 'write'" (click)="editorTab = 'write'">
            <mat-icon>edit</mat-icon> Write
          </button>
          <button type="button" class="tab-btn" [class.active]="editorTab === 'preview'" (click)="editorTab = 'preview'">
            <mat-icon>visibility</mat-icon> Preview
          </button>
        </div>

        <div class="editor-container" [hidden]="editorTab !== 'write'">
          <div class="editor-box">
            <div class="formatting-toolbar">
              <button type="button" class="toolbar-btn" (click)="insertMarkdown('bold', contentArea)" matTooltip="Bold text">
                <mat-icon>format_bold</mat-icon>
              </button>
              <button type="button" class="toolbar-btn" (click)="insertMarkdown('italic', contentArea)" matTooltip="Italic text">
                <mat-icon>format_italic</mat-icon>
              </button>
              <button type="button" class="toolbar-btn" (click)="insertMarkdown('link', contentArea)" matTooltip="Add link">
                <mat-icon>insert_link</mat-icon>
              </button>
              <button type="button" class="toolbar-btn" (click)="insertMarkdown('list', contentArea)" matTooltip="Bulleted list">
                <mat-icon>format_list_bulleted</mat-icon>
              </button>
              <button type="button" class="toolbar-btn" (click)="insertMarkdown('numlist', contentArea)" matTooltip="Numbered list">
                <mat-icon>format_list_numbered</mat-icon>
              </button>
              <button type="button" class="toolbar-btn" (click)="insertMarkdown('code', contentArea)" matTooltip="Code block">
                <mat-icon>code</mat-icon>
              </button>
            </div>
            <textarea formControlName="content" rows="12" placeholder="Write your post content here... (Supports Markdown)" #contentArea class="editor-textarea"></textarea>
          </div>
          <div class="editor-error" *ngIf="postForm.get('content')?.touched && postForm.get('content')?.hasError('required')">
            Content is required.
          </div>
        </div>

        <div class="preview-container animate-fade" *ngIf="editorTab === 'preview'">
          <div class="markdown-preview-pane" [innerHTML]="postForm.get('content')?.value | markdown"></div>
          <div *ngIf="!postForm.get('content')?.value" class="preview-empty">No content to preview yet. Start typing under the Write tab!</div>
        </div>

        <div class="media-upload-section">
          <input type="file" id="mediaUpload" (change)="onFileSelected($event)" accept="image/*,video/*" style="display: none" #fileInput>
          
          <div class="media-preview" *ngIf="mediaUrl">
            <div class="media-preview-inner">
              <img *ngIf="isImage(mediaUrl)" [src]="mediaUrl" alt="Preview" />
              <video *ngIf="isVideo(mediaUrl)" [src]="mediaUrl" controls></video>
              <button mat-icon-button color="warn" type="button" class="remove-media-btn" (click)="removeMedia()" matTooltip="Remove media">
                <mat-icon>close</mat-icon>
              </button>
            </div>
          </div>

          <button mat-stroked-button type="button" (click)="fileInput.click()" [disabled]="uploadingMedia" class="attach-btn" *ngIf="!mediaUrl">
            <mat-icon>image</mat-icon>
            {{ uploadingMedia ? 'Uploading...' : 'Add Photos or Video' }}
          </button>
        </div>

        <div class="actions">
          <button mat-button type="button" (click)="cancel()">Cancel</button>
          <button mat-flat-button color="primary" type="submit" [disabled]="postForm.invalid || submitting || uploadingMedia" class="post-btn">
            {{ submitting ? 'Posting...' : 'Post' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
